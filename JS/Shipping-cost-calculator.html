<!DOCTYPE html>
<html>
  <head>    
    <title>
      Shipping Cost Calculator
    </title>
  </head>

  <body>
    <h1>Shipping Cost Calculator</h1>
    <p>Orders under $40 = +10$ Shipping</p>
    <p>Orders above $40 = Free Shipping</p>
    <input class="price" type="text" placeholder="0">
    <button class="calc">Calculate</button>
    <p>Total Cost: <span class="output">0</span> $</p>

    <script>
      let calc=document.querySelector('.calc');

      let inp=document.querySelector('.price');

      calc.addEventListener('click' , calculate);

      inp.addEventListener('keydown' , calculate);
      function calculate(){
        let price = document.querySelector('.price');
        let finalCost=price.value;
        if(finalCost<=40){
          finalCost=(Number(finalCost)+10);
        }

        let out=document.querySelector('.output');

        if(event.key==='Enter' || event.type==='click'){
          out.textContent=finalCost;
        }
        
      }
    </script>
  </body>
</html>
