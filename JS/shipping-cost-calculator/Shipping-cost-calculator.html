<!DOCTYPE html>
<html>
  <head>    
    <title>
      Shipping Cost Calculator
    </title>
  </head>

  <body>
    <h1>Shipping Cost Calculator</h1>
    <p>Orders under $40 = +10$ Shipping</p>
    <p>Orders above $40 = Free Shipping</p>
    <input class="price" type="text" placeholder="0">
    <button class="calc">Calculate</button>
    <p>Total Cost: <span class="output">0</span> $</p>

    <script src="shipping-cost-calculator.js">
      
    </script>
  </body>
</html>
