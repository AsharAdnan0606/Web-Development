<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <style>
      #stats{
        white-space: pre-line;        
      }

      .start-button{
        display: block;
        margin-bottom: 10px;
      }
      
      .move-show{
        margin-top: 15px;
        border:1px solid black;
        width: 250px;
        height: 100px;
        
      }
    </style>
  </head>
  <body>
    <h1>Rock Paper Scissors</h1>
    <button id="start-button" class="start-button" onclick="runGame()">start</button>
    <button id="rb" , class="button" onclick="select_rock()" >Rock</button>
    <button class="button" onclick="select_paper()">Paper</button>
    <button class="button" onclick="select_scissors()">Scissors</button>
    <p id='stats' style="display: none;"></p>
    
    <div id='output'>
      <div class="move-show">
        your move:


      </div>


      <div class="move-show">
        cpu move:


      </div>
    </div>

    <script>
      let player_val , opp_val , winner;
      
      function select_rock(){
        player_val='rock';
      }

      function select_paper(){
        player_val='paper';
      }

      function select_scissors(){
        player_val='scissors';
      }      

      function runGame(){
        generate_opp();
        decide_winner();
        let show=document.querySelectorAll(".move-show");
        show[0].textContent=`${player_val}`;
        show[1].textContent=`${opp_val}`;
      }

      function generate_opp(){
        let num=Math.random();    
        if(num>0 && num<=1/3){
          opp_val='rock';
        }else if(num>1/3 && num<=2/3){
          opp_val='paper';
        }else{
          opp_val='scissors';
        }
      }
      function decide_winner(){
        if(player_val===opp_val){
          winner='draw';
        }else{
          if(player_val==='rock'){
            if(opp_val==='paper'){
              winner='opp';
            }else{
              winner='player';
            }
          }else if(player_val==='paper'){
            if(opp_val==='scissors'){
              winner='opp';
            }else{
              winner='player';
            }
          }else{
            if(opp_val==='rock'){
              winner='opp';
            }else{
              winner='player';
            }
          }        
        }
      }

      //   Computer choose:${opp_val}
      //   Winner:${winner}`;

      //   text.style.color='red';
      // });      

      // let content=document.querySelector('#content');
      // let rockButton=document.querySelector('#rb');
      // rockButton.addEventListener("click",()=>{
      //   content.style.display='block';
      // });

    </script>
  </body>
</html>
