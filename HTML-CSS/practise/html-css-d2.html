<!DOCTYPE html>

<html>
    <head>
        <style>
            .text1{
                color:rgb(28, 136, 28);
                font-weight: bold;
            }
            
            .link1{
                transition: color 0.15s;
            }

            .link1:hover{
                color: rgb(231, 18, 18);
            }


            .add-to-cart-button{
                background-color: rgb(255, 238, 0);
                border: none;
                width: 90px;
                height: 25px;
                border-radius: 11px;
                margin-right: 3px;
                transition: background-color 0.15s , opacity 0.15s;
            }

            .add-to-cart-button:hover{
                background-color: rgb(238, 222, 1);
            }

            .add-to-cart-button:active{
                opacity: 0.3;  
            }

            .buy-now-button{
                background-color: rgb(250, 167, 14);
                border: none;
                width: 85px;
                height: 25px;
                border-radius: 11px;
                transition: background-color 0.15s , opacity 0.15s;
            }

            .buy-now-button:hover{
                background-color: rgb(235, 157, 12);                
            }

            .buy-now-button:active{
                opacity: 0.3;  
            }

            p{
                font-family: Arial;
            }

        </style>
    </head>

    <body>
        <a class="link1" href="https://amazon.com">Back to Amazon</a>
        <h1>Nike Black Running Shoes</h1>
        <p class="text1">$39 - in stock.</p>
        <p class="text2">Free delivery tomorrow.</p>
        <button class="add-to-cart-button">Add to cart</button>
        <button class="buy-now-button">Buy now</button>
    </body>
</html>
