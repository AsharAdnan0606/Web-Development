<!DOCTYPE html>
<html>
    <head>        
        <style>
            .cards{
                display: flex;  
                gap:50px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .card{
                border: 1px solid black;
                /* padding-bottom: 150px; */
                width: 220px;
                display: flex;
                justify-content: center;
                height: 150px;
            }

            .card:hover{
                height: 180px;
                width: 250px;
                transition: 0.2s;
            }
        </style>
    </head>

    <body>
        <div class="cards">
            <div class=card>
                Tic-Tac-Toe (C)

            </div>

            <div class=card>
                2D Shooter Game (C++)
            </div>

            <div class=card>
                Music Player (C++)
            </div>

            <div class=card>
                University Lost & Found System 
            </div>
            
        </div>
        
    </body>
</html>
